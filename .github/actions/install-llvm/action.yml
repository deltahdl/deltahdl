---
description: >-
  Install the newest STABLE Clang/LLVM toolchain (clang, clang-tidy,
  clang-format, llvm-cov, llvm-profdata) from apt.llvm.org and symlink
  unversioned binary names so callers never name a version. Nothing is pinned:
  the latest LLVM stable release is discovered at run time and auto-followed.
name: Install LLVM
inputs:
  stagger-index:
    description: >-
      Per-shard offset used to spread the GitHub API version-discovery call
      across the matrix (sleeps stagger-index * 5 seconds before querying), so
      many shards do not hit api.github.com in one burst. Pass matrix.shard.
    required: false
    default: '0'
runs:
  steps:
    - name: Install newest stable LLVM/Clang from apt.llvm.org
      env:
        STAGGER_INDEX: ${{ inputs.stagger-index }}
        GH_TOKEN: ${{ github.token }}
      run: |
        . /etc/os-release
        # Stagger concurrent shards so the matrix does not query the GitHub API
        # in one simultaneous burst. 10# forces base-10 (shard ids like 08/09
        # would otherwise be parsed as invalid octal).
        sleep $(( (10#${STAGGER_INDEX:-0}) * 5 ))
        # Discover the newest stable LLVM major from the GitHub releases API.
        # Authenticated (raises the unauthenticated 60/hr limit to 1000/hr) and
        # retried with backoff to ride out transient 403 / rate-limit responses.
        major=""
        for attempt in 1 2 3 4 5; do
          resp=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/llvm/llvm-project/releases/latest) &&
            major=$(echo "${resp}" |
              jq -r .tag_name | sed -E 's/^llvmorg-([0-9]+).*/\1/')
          if echo "${major}" | grep -qE '^[0-9]+$'; then break; fi
          echo "::warning::LLVM version discovery attempt ${attempt} failed;" \
            "retrying in $(( attempt * 5 ))s"
          sleep $(( attempt * 5 ))
        done
        if ! echo "${major}" | grep -qE '^[0-9]+$'; then
          # Fallback: the GitHub releases API had a bad window. Derive the
          # newest stable major straight from the apt.llvm.org repo we install
          # from. The numbered llvm-toolchain-<codename>-<N> dists are stable;
          # the unversioned trunk dist has no numeric suffix and is excluded by
          # the regex, so this still floats to newest STABLE (never trunk).
          echo "::warning::releases API discovery failed; falling back to" \
            "apt.llvm.org repo listing"
          major=$(curl -fsSL "http://apt.llvm.org/${VERSION_CODENAME}/dists/" |
            grep -oE "llvm-toolchain-${VERSION_CODENAME}-[0-9]+" |
            sed -E 's/.*-([0-9]+)$/\1/' | sort -n | tail -1)
        fi
        if ! echo "${major}" | grep -qE '^[0-9]+$'; then
          echo "::error::could not resolve latest LLVM stable major"
          exit 1
        fi
        echo "Installing newest stable LLVM/Clang: ${major}"
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key |
          sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
        echo "deb http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-${major} main" |
          sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
        sudo apt-get update
        sudo apt-get install -y \
          "clang-${major}" "clang-tidy-${major}" "clang-format-${major}" \
          "llvm-${major}"
        for tool in clang clang++ clang-cpp clang-tidy clang-format \
          clang-apply-replacements run-clang-tidy llvm-cov llvm-profdata; do
          if [ -x "/usr/bin/${tool}-${major}" ]; then
            sudo ln -sf "/usr/bin/${tool}-${major}" "/usr/bin/${tool}"
          fi
        done
      shell: bash
  using: composite
