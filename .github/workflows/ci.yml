---
concurrency:
  cancel-in-progress: true
  group: ci-${{ github.ref }}
jobs:
  # ── Detect: check if scripts changed ──
  detect:
    outputs:
      clang-tidy-configs-changed: >-
        ${{ steps.check.outputs.clang_tidy_configs_changed }}
      deltahdl-changed: >-
        ${{ steps.check.outputs.deltahdl_changed }}
      force-static-analysis: >-
        ${{ steps.check.outputs.force_static_analysis }}
      force-yamllint: >-
        ${{ steps.check.outputs.force_yamllint }}
      implement-clause: >-
        ${{ steps.check.outputs.implement_clause }}
      implement-subclause: >-
        ${{ steps.check.outputs.implement_subclause }}
      lib-changed: >-
        ${{ steps.check.outputs.lib_changed }}
      scripts-changed: >-
        ${{ steps.check.outputs.scripts_changed }}
      workflows-changed: >-
        ${{ steps.check.outputs.workflows_changed }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        name: Detect changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "clang_tidy_configs_changed=false" >> "$GITHUB_OUTPUT"
            echo "deltahdl_changed=true" >> "$GITHUB_OUTPUT"
            echo "force_static_analysis=false" >> "$GITHUB_OUTPUT"
            echo "force_yamllint=false" >> "$GITHUB_OUTPUT"
            echo "implement_clause=true" >> "$GITHUB_OUTPUT"
            echo "implement_subclause=true" >> "$GITHUB_OUTPUT"
            echo "lib_changed=true" >> "$GITHUB_OUTPUT"
            echo "scripts_changed=false" >> "$GITHUB_OUTPUT"
            echo "workflows_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          else
            BASE="${{ github.event.before }}"
          fi
          ZERO="0000000000000000000000000000000000000000"
          if [ -z "$BASE" ] || [ "$BASE" = "$ZERO" ]; then
            echo "clang_tidy_configs_changed=true" >> "$GITHUB_OUTPUT"
            echo "deltahdl_changed=true" >> "$GITHUB_OUTPUT"
            echo "force_static_analysis=false" >> "$GITHUB_OUTPUT"
            echo "force_yamllint=false" >> "$GITHUB_OUTPUT"
            echo "implement_clause=true" >> "$GITHUB_OUTPUT"
            echo "implement_subclause=true" >> "$GITHUB_OUTPUT"
            echo "lib_changed=true" >> "$GITHUB_OUTPUT"
            echo "scripts_changed=true" >> "$GITHUB_OUTPUT"
            echo "workflows_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE" "${{ github.sha }}")
          PAT='^(scripts/run_sim_tests/|scripts/run_sv_tests/|lib/run_tests_common/|test/scripts/run_sim_tests/|test/scripts/run_sv_tests/|test/lib/run_tests_common/)'
          if echo "$CHANGED" | grep -qE "$PAT"; then
            echo "scripts_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "scripts_changed=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qE '^etc/clang_tidy/'; then
            echo "clang_tidy_configs_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "clang_tidy_configs_changed=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qE '^\.github/workflows/.*\.yml'; then
            echo "workflows_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "workflows_changed=false" >> "$GITHUB_OUTPUT"
          fi
          DHDL='^(src/|test/src/|lib/run_tests_common/|lib/test/|test/lib/run_tests_common/|test/lib/run_sim_tests/|test/lib/run_sv_tests/|scripts/run_sim_tests/|scripts/run_sv_tests/)'
          if echo "$CHANGED" | grep -qE "$DHDL"; then
            echo "deltahdl_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "deltahdl_changed=false" >> "$GITHUB_OUTPUT"
          fi
          LIB='^(lib/(lrm|github)/|test/lib/(lrm|github)/)'
          IC='^(scripts/implement_clause/|test/scripts/implement_clause/)'
          ISC='^(scripts/implement_subclause/|test/scripts/implement_subclause/)'
          LIB_HIT=false
          if echo "$CHANGED" | grep -qE "$LIB"; then
            LIB_HIT=true
          fi
          echo "lib_changed=$LIB_HIT" >> "$GITHUB_OUTPUT"
          if [ "$LIB_HIT" = "true" ] \
              || echo "$CHANGED" | grep -qE "$IC"; then
            echo "implement_clause=true" >> "$GITHUB_OUTPUT"
          else
            echo "implement_clause=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$LIB_HIT" = "true" ] \
              || echo "$CHANGED" | grep -qE "$ISC"; then
            echo "implement_subclause=true" >> "$GITHUB_OUTPUT"
          else
            echo "implement_subclause=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SHA="${{ github.event.pull_request.head.sha }}"
            MSG=$(git log -1 --format=%B "$SHA")
          else
            MSG=$(git log -1 --format=%B "${{ github.sha }}")
          fi
          if echo "$MSG" | grep -qiE '\[static[- ]?analysis\]'; then
            echo "force_static_analysis=true" >> "$GITHUB_OUTPUT"
          else
            echo "force_static_analysis=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$MSG" | grep -qiE '\[yaml[- ]?lint\]'; then
            echo "force_yamllint=true" >> "$GITHUB_OUTPUT"
          else
            echo "force_yamllint=false" >> "$GITHUB_OUTPUT"
          fi
  # ── Gate: static analysis for all scripts ──
  static-analysis:
    if: >-
      needs.detect.outputs.force-static-analysis == 'true'
      || needs.detect.outputs.implement-clause == 'true'
      || needs.detect.outputs.implement-subclause == 'true'
      || needs.detect.outputs.lib-changed == 'true'
      || needs.detect.outputs.scripts-changed == 'true'
      || inputs.force-static-analysis
    needs: detect
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          key: >-
            pip-${{ github.job }}-${{
            hashFiles('.github/workflows/ci.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-${{ github.job }}-
      - name: Install tools
        run: |
          pip install \
            assert-no-inline-directives \
            assert-no-linter-config-files \
            assert-one-assert-per-pytest \
            mypy pylint pytest
          npm install -g jscpd
      - name: Assert no inline lint disables
        run: >-
          assert-no-inline-directives
          --tools pylint,mypy,yamllint
          --verbose
          ${{ github.workspace }}/**/*
      - name: Assert no linter config files
        run: >-
          assert-no-linter-config-files
          --linters pylint,mypy,yamllint
          --verbose
          ${{ github.workspace }}
      - name: Assert one assert per pytest
        run: >-
          assert-one-assert-per-pytest
          --verbose
          ${{ github.workspace }}/test/lib
          ${{ github.workspace }}/test/scripts
      - name: Run pylint on source
        run: >-
          PYTHONPATH=.:scripts python3 -m pylint
          lib/ scripts/run_sim_tests/ scripts/run_sv_tests/
          --fail-on=C,R,W --fail-under=10.0
      - name: Run pylint on tests
        run: >-
          PYTHONPATH=.:scripts python3 -m pylint --recursive=y
          test/lib/ test/scripts/run_sim_tests/
          test/scripts/run_sv_tests/
          --fail-on=C,R,W --fail-under=10.0
      - name: Run mypy on source
        run: >-
          PYTHONPATH=.:scripts python3 -m mypy
          lib/ scripts/run_sim_tests/ scripts/run_sv_tests/
      - name: Run mypy on tests
        run: >-
          MYPYPATH=.:scripts python3 -m mypy
          test/lib/ test/scripts/run_sim_tests/
          test/scripts/run_sv_tests/
      - name: Detect copy-paste in source
        run: >-
          jscpd --pattern "**/*.py" --threshold 0
          --reporters console lib/
          scripts/run_sim_tests/ scripts/run_sv_tests/
      - name: Detect copy-paste in tests
        run: >-
          jscpd --pattern "**/*.py" --threshold 0
          --reporters console test/lib/
          test/scripts/run_sim_tests/ test/scripts/run_sv_tests/
  # ── Lane: lib ──
  # DO NOT lower coverage thresholds. Uncovered code is untested code —
  # lowering it hides bugs and lets regressions slip through silently.
  test-lib-run-tests-common:
    needs: static-analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          key: >-
            pip-${{ github.job }}-${{
            hashFiles('.github/workflows/ci.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-${{ github.job }}-
      - name: Install tools
        run: pip install pytest pytest-cov
      - name: Run tests with 100% coverage gate
        run: >-
          python3 -m pytest test/lib/run_tests_common/ -v
          --cov=lib.run_tests_common
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=100
  # ── Lane: lib/github ──
  test-lib-github:
    needs: static-analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          key: >-
            pip-${{ github.job }}-${{
            hashFiles('.github/workflows/ci.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-${{ github.job }}-
      - name: Install tools
        run: pip install pytest pytest-cov
      - name: Run tests with 100% coverage gate
        run: >-
          python3 -m pytest test/lib/github/unit/ -v
          --cov=lib.github
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=100
  # ── Lane: lib/lrm ──
  test-lib-lrm:
    needs: static-analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          key: >-
            pip-${{ github.job }}-${{
            hashFiles('.github/workflows/ci.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-${{ github.job }}-
      - name: Install tools
        run: pip install pytest pytest-cov
      - name: Run tests with 100% coverage gate
        run: >-
          python3 -m pytest test/lib/lrm/unit/ -v
          --cov=lib.lrm
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=100
  # ── Lane: run_sim_tests ──
  test-run-sim-tests:
    needs:
      - static-analysis
      - test-lib-run-tests-common
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          key: >-
            pip-${{ github.job }}-${{
            hashFiles('.github/workflows/ci.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-${{ github.job }}-
      - name: Install tools
        run: pip install pytest pytest-cov
      - name: Run tests with 100% coverage gate
        run: >-
          python3 -m pytest test/scripts/run_sim_tests/ -v
          --cov=run_sim_tests
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=100
  # ── Lane: run_sv_tests ──
  test-run-sv-tests:
    needs:
      - static-analysis
      - test-lib-run-tests-common
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          key: >-
            pip-${{ github.job }}-${{
            hashFiles('.github/workflows/ci.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-${{ github.job }}-
      - name: Install tools
        run: pip install pytest pytest-cov
      - name: Run tests with 100% coverage gate
        run: >-
          python3 -m pytest test/scripts/run_sv_tests/ -v
          --cov=run_sv_tests
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=100
  # ── Trigger: deltahdl ──
  trigger-deltahdl-ci:
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
    if: >-
      !failure() && !cancelled()
      && needs.detect.outputs.deltahdl-changed == 'true'
    needs:
      - detect
      - static-analysis
      - test-lib-run-tests-common
      - test-lib-github
      - test-lib-lrm
      - test-run-sim-tests
      - test-run-sv-tests
      - yamllint
    runs-on: ubuntu-24.04
    steps:
      - name: Trigger DeltaHDL workflow
        run: >-
          gh workflow run deltahdl.yml
          --repo "${{ github.repository }}"
          -f branch="${{ github.event.pull_request.head.ref
          || github.ref_name }}"
          -f event="${{ github.event_name }}"
          -f sha="${{ github.event.pull_request.head.sha
          || github.sha }}"
  # ── Trigger: implement_clause ──
  trigger-implement-clause:
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
    if: >-
      !failure() && !cancelled()
      && needs.detect.outputs.implement-clause == 'true'
    needs:
      - detect
      - static-analysis
      - test-lib-run-tests-common
      - test-lib-github
      - test-lib-lrm
      - test-run-sim-tests
      - test-run-sv-tests
      - yamllint
    runs-on: ubuntu-24.04
    steps:
      - name: Trigger Implement Clause workflow
        run: >-
          gh workflow run implement_clause.yml
          --repo "${{ github.repository }}"
          -f branch="${{ github.event.pull_request.head.ref
          || github.ref_name }}"
          -f event="${{ github.event_name }}"
          -f sha="${{ github.event.pull_request.head.sha
          || github.sha }}"
  # ── Trigger: implement_subclause ──
  trigger-implement-subclause:
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
    if: >-
      !failure() && !cancelled()
      && needs.detect.outputs.implement-subclause == 'true'
    needs:
      - detect
      - static-analysis
      - test-lib-run-tests-common
      - test-lib-github
      - test-lib-lrm
      - test-run-sim-tests
      - test-run-sv-tests
      - yamllint
    runs-on: ubuntu-24.04
    steps:
      - name: Trigger Implement Subclause workflow
        run: >-
          gh workflow run implement_subclause.yml
          --repo "${{ github.repository }}"
          -f branch="${{ github.event.pull_request.head.ref
          || github.ref_name }}"
          -f event="${{ github.event_name }}"
          -f sha="${{ github.event.pull_request.head.sha
          || github.sha }}"
  # ── Gate: yamllint for workflow-only changes ──
  yamllint:
    if: >-
      needs.detect.outputs.clang-tidy-configs-changed == 'true'
      || needs.detect.outputs.force-yamllint == 'true'
      || needs.detect.outputs.workflows-changed == 'true'
      || inputs.force-yamllint
    needs: detect
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          key: >-
            pip-${{ github.job }}-${{
            hashFiles('.github/workflows/ci.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-${{ github.job }}-
      - name: Install tools
        run: >-
          pip install
          assert-no-inline-directives
          assert-no-linter-config-files
          yamllint
      - name: Assert no inline yamllint disables
        run: >-
          assert-no-inline-directives
          --tools yamllint
          --verbose
          ${{ github.workspace }}/**/*
      - name: Assert no yamllint config files
        run: >-
          assert-no-linter-config-files
          --linters yamllint
          --verbose
          ${{ github.workspace }}
      - name: Lint YAML
        run: |
          EMPTY='empty-lines: {max: 0, max-start: 0, max-end: 1}'
          KEY='key-ordering: enable'
          LL='line-length: disable'
          NL='new-line-at-end-of-file: enable'
          TR='truthy: {allowed-values: ["true", "false", "on"]}'
          RULES="$EMPTY, $KEY, $LL, $NL, $TR"
          yamllint --strict \
            --config-data \
            "{extends: default, rules: {$RULES}}" \
            .github/workflows/*.yml \
            etc/clang_tidy/*.yml
name: CI
on:
  pull_request:
    paths:
      - .github/workflows/ci.yml
      - .github/workflows/deltahdl.yml
      - .github/workflows/documentation.yml
      - .github/workflows/implement_clause.yml
      - .github/workflows/implement_subclause.yml
      - CMakeLists.txt
      - etc/**
      - lib/**
      - scripts/implement_clause/**
      - scripts/implement_subclause/**
      - scripts/run_sim_tests/**
      - scripts/run_sv_tests/**
      - src/**
      - test/CMakeLists.txt
      - test/lib/**
      - test/scripts/__init__.py
      - test/scripts/conftest.py
      - test/scripts/implement_clause/**
      - test/scripts/implement_subclause/**
      - test/scripts/run_sim_tests/**
      - test/scripts/run_sv_tests/**
      - test/src/**
  push:
    branches: [main]
    paths:
      - .github/workflows/ci.yml
      - .github/workflows/deltahdl.yml
      - .github/workflows/documentation.yml
      - .github/workflows/implement_clause.yml
      - .github/workflows/implement_subclause.yml
      - CMakeLists.txt
      - etc/**
      - lib/**
      - scripts/implement_clause/**
      - scripts/implement_subclause/**
      - scripts/run_sim_tests/**
      - scripts/run_sv_tests/**
      - src/**
      - test/CMakeLists.txt
      - test/lib/**
      - test/scripts/__init__.py
      - test/scripts/conftest.py
      - test/scripts/implement_clause/**
      - test/scripts/implement_subclause/**
      - test/scripts/run_sim_tests/**
      - test/scripts/run_sv_tests/**
      - test/src/**
  workflow_dispatch:
    inputs:
      force-static-analysis:
        default: false
        description: Run static analysis only
        type: boolean
      force-yamllint:
        default: false
        description: Run yamllint only
        type: boolean
