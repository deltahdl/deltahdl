name: scripts
on:
  pull_request:
    paths:
      - .github/workflows/scripts.yml
      - lib/python/**
      - scripts/**
      - test/lib/python/**
      - test/scripts/**
  push:
    branches: [main]
    paths:
      - .github/workflows/scripts.yml
      - lib/python/**
      - scripts/**
      - test/lib/python/**
      - test/scripts/**
  workflow_dispatch:
