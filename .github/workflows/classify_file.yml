---
concurrency:
  cancel-in-progress: true
  group: classify_file-${{ github.ref }}
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          key: >-
            pip-classify_file-${{
            hashFiles('.github/workflows/classify_file.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-classify_file-
      - name: Install tools
        run: |
          pip install \
            assert-no-inline-directives \
            assert-no-linter-config-files \
            assert-one-assert-per-pytest \
            mypy pylint pytest pytest-cov
          npm install -g jscpd
      - name: Assert no inline lint disables
        run: >-
          assert-no-inline-directives
          --tools pylint,mypy
          --verbose
          ${{ github.workspace }}/scripts/classify_file/
          ${{ github.workspace }}/test/scripts/classify_file/**/*
      - name: Assert no linter config files
        run: >-
          assert-no-linter-config-files
          --linters pylint,mypy
          --verbose
          ${{ github.workspace }}
      - name: Assert one assert per pytest
        run: >-
          assert-one-assert-per-pytest
          --verbose
          ${{ github.workspace }}/test/scripts/classify_file
      - name: Run pylint on source
        run: >-
          PYTHONPATH=. python3 -m pylint scripts/classify_file/
          --fail-on=C,R,W --fail-under=10.0
      - name: Run pylint on tests
        run: >-
          PYTHONPATH=.:scripts:test/scripts/classify_file/unit
          python3 -m pylint --recursive=y test/scripts/classify_file/
          --fail-on=C,R,W --fail-under=10.0
      - name: Run mypy on source
        run: PYTHONPATH=. python3 -m mypy scripts/classify_file/
      - name: Run mypy on tests
        run: >-
          MYPYPATH=.:scripts:test/scripts/classify_file/unit
          python3 -m mypy --explicit-package-bases
          test/scripts/classify_file/
      - name: Detect copy-paste in source
        run: >-
          jscpd --pattern "**/*.py" --threshold 0
          --reporters console scripts/classify_file/
      - name: Detect copy-paste in tests
        run: >-
          jscpd --pattern "**/*.py" --threshold 0
          --reporters console test/scripts/classify_file/
      - name: Run unit tests with 100% coverage gate
        run: >-
          PYTHONPATH=.:scripts python3 -m pytest
          test/scripts/classify_file/unit/ -v
          --cov=classify_file
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=100
      - name: Run integration tests
        run: >-
          PYTHONPATH=.:scripts python3 -m pytest
          test/scripts/classify_file/integration/ -v
      - name: Run e2e tests
        run: >-
          PYTHONPATH=.:scripts python3 -m pytest
          test/scripts/classify_file/e2e/ -v
name: classify_file
on:
  pull_request:
    paths:
      - .github/workflows/classify_file.yml
      - scripts/classify_file/**
      - test/scripts/classify_file/**
  push:
    branches: [main]
    paths:
      - .github/workflows/classify_file.yml
      - scripts/classify_file/**
      - test/scripts/classify_file/**
  workflow_dispatch:
