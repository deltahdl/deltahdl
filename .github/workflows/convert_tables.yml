---
concurrency:
  cancel-in-progress: true
  group: convert_table-${{ github.ref }}
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          key: >-
            pip-convert_table-${{
            hashFiles('.github/workflows/convert_tables.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-convert_table-
      - name: Install tools
        run: |
          pip install \
            assert-no-inline-directives \
            assert-no-linter-config-files \
            assert-one-assert-per-pytest \
            mypy pylint pytest pytest-cov yamllint
          npm install -g jscpd
      - name: Lint YAML
        run: |
          EMPTY='empty-lines: {max: 0, max-start: 0, max-end: 1}'
          KEY='key-ordering: enable'
          LL='line-length: disable'
          NL='new-line-at-end-of-file: enable'
          TR='truthy: {allowed-values: ["true", "false", "on"]}'
          RULES="$EMPTY, $KEY, $LL, $NL, $TR"
          yamllint --strict \
            --config-data \
            "{extends: default, rules: {$RULES}}" \
            .github/workflows/convert_tables.yml
      - name: Assert no inline directives
        run: >-
          assert-no-inline-directives
          --tools pylint,mypy,yamllint
          --verbose
          ${{ github.workspace }}/**/*
      - name: Assert no linter config files
        run: >-
          assert-no-linter-config-files
          --linters pylint,mypy,yamllint
          --verbose
          ${{ github.workspace }}
      - name: Run pylint on source
        run: >-
          PYTHONPATH=. python3 -m pylint lib/ scripts/
          --fail-on=C,R,W --fail-under=10.0
      - name: Run pylint on tests
        run: >-
          PYTHONPATH=.:scripts:test/scripts/convert_table/unit
          python3 -m pylint --recursive=y
          lib/test/ test/scripts/ test/lib/
          --fail-on=C,R,W --fail-under=10.0
      - name: Run mypy on source
        run: PYTHONPATH=. python3 -m mypy lib/ scripts/
      - name: Run mypy on tests
        run: >-
          MYPYPATH=.:scripts:test/scripts/convert_table/unit
          python3 -m mypy --explicit-package-bases
          lib/test/ test/scripts/ test/lib/
      - name: Detect copy-paste in source
        run: >-
          jscpd --pattern "**/*.py" --threshold 0
          --reporters console lib/ scripts/
      - name: Detect copy-paste in tests
        run: >-
          jscpd --pattern "**/*.py" --threshold 0
          --reporters console lib/test/ test/scripts/ test/lib/
      - name: Run unit tests with 100% coverage gate
        run: >-
          PYTHONPATH=.:scripts python3 -m pytest
          test/scripts/convert_table/unit/ -v
          --cov=convert_table
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=100
      - name: Run integration tests
        run: >-
          PYTHONPATH=.:scripts python3 -m pytest
          test/scripts/convert_table/integration/ -v
      - name: Run e2e tests
        run: >-
          PYTHONPATH=.:scripts python3 -m pytest
          test/scripts/convert_table/e2e/ -v
name: convert_table
on:
  pull_request:
    paths:
      - .github/workflows/convert_tables.yml
      - scripts/convert_table/**
      - test/scripts/convert_table/**
  push:
    branches: [main]
    paths:
      - .github/workflows/convert_tables.yml
      - scripts/convert_table/**
      - test/scripts/convert_table/**
  workflow_dispatch:
