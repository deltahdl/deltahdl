      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache clang-18
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          key: >-
            ccache-build-tsan-shard-${{
            matrix.shard }}-${{
            hashFiles('**/CMakeLists.txt') }}-${{
            github.sha }}
          path: .ccache
          restore-keys: |
