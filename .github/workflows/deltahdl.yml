name: DeltaHDL
on:
  pull_request:
    paths:
      - .github/workflows/deltahdl.yml
      - CMakeLists.txt
      - etc/**
      - lib/python/run_tests_common/**
      - lib/cpp/test/**
      - scripts/run_sim_tests/**
      - scripts/run_sv_tests/**
      - src/**
      - test/CMakeLists.txt
      - test/lib/run_tests_common/**
      - test/scripts/run_sim_tests/**
      - test/scripts/run_sv_tests/**
      - test/src/**
  push:
    branches: [main]
    paths:
      - .github/workflows/deltahdl.yml
      - CMakeLists.txt
      - etc/**
      - lib/python/run_tests_common/**
      - lib/cpp/test/**
      - scripts/run_sim_tests/**
      - scripts/run_sv_tests/**
      - src/**
      - test/CMakeLists.txt
      - test/lib/run_tests_common/**
      - test/scripts/run_sim_tests/**
      - test/scripts/run_sv_tests/**
      - test/src/**
  workflow_dispatch:
