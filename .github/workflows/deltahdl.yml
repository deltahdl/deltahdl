          gh release create \
            "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            deltahdl-linux-amd64 \
            deltahdl-macos-arm64
      - name: Update latest tag
        run: |
          git tag -f latest
          git push origin latest --force
  static-analysis:
    outputs:
      scripts-changed: >-
        ${{ steps.detect.outputs.scripts_changed }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        name: Detect changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "scripts_changed=true" >> "$GITHUB_OUTPUT"
            echo "yaml_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          else
            BASE="${{ github.event.before }}"
          fi
          ZERO="0000000000000000000000000000000000000000"
          if [ -z "$BASE" ] || [ "$BASE" = "$ZERO" ]; then
            echo "scripts_changed=true" >> "$GITHUB_OUTPUT"
            echo "yaml_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE" "${{ github.sha }}")
          PAT='^(lib/python/run_tests_common/|scripts/run_sim_tests/|scripts/run_sv_tests/|test/lib/run_tests_common/|test/scripts/run_sim_tests/|test/scripts/run_sv_tests/)'
          if echo "$CHANGED" | grep -qE "$PAT"; then
            echo "scripts_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "scripts_changed=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qE '^(\.github/workflows/deltahdl\.yml|etc/clang_tidy/)'; then
            echo "yaml_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "yaml_changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          key: >-
            pip-${{ github.job }}-${{
            hashFiles('.github/workflows/deltahdl.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-${{ github.job }}-
      - name: Restore PMD cache
        uses: actions/cache@v4
        with:
          key: pmd-7.21.0
          path: pmd-bin-7.21.0
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18
          pip install \
            assert-no-inline-directives \
            assert-no-linter-config-files \
            assert-one-assert-per-pytest \
            mypy pylint pytest yamllint
          npm install -g jscpd
          if [ ! -d pmd-bin-7.21.0 ]; then
            PMD=pmd-dist-7.21.0-bin.zip
            PMD_URL=https://github.com/pmd/pmd/releases
            wget -q "$PMD_URL/download/pmd_releases%2F7.21.0/$PMD"
            unzip -q "$PMD"
          fi
          echo "$PWD/pmd-bin-7.21.0/bin" >> "$GITHUB_PATH"
      # ── YAML lint (conditional) ──
      - if: steps.detect.outputs.yaml_changed == 'true'
        name: Lint YAML
        run: |
          EMPTY='empty-lines: {max: 0, max-start: 0, max-end: 1}'
          KEY='key-ordering: enable'
          LL='line-length: disable'
          NL='new-line-at-end-of-file: enable'
          TR='truthy: {allowed-values: ["true", "false", "on"]}'
          RULES="$EMPTY, $KEY, $LL, $NL, $TR"
          yamllint --strict \
            --config-data \
            "{extends: default, rules: {$RULES}}" \
            .github/workflows/deltahdl.yml \
            etc/clang_tidy/*.yml
      # ── Assert steps ──
      # DO NOT disable these steps. Inline suppression comments (NOLINT,
      # clang-format off, etc.) hide problems instead of fixing them and
      # make the codebase progressively harder to maintain.
      - name: Assert no linter config files
        run: >-
          assert-no-linter-config-files
          --linters pylint,mypy,yamllint
          --verbose
          ${{ github.workspace }}
      - name: Assert no inline directives
        run: >-
          assert-no-inline-directives
          --tools clang-tidy,clang-format,clang-diagnostic,pylint,mypy,yamllint
          src/ test/
          lib/python/ scripts/ test/lib/ test/scripts/
          ${{ github.workspace }}/**/*
      - if: steps.detect.outputs.scripts_changed == 'true'
        name: Assert one assert per pytest
        run: >-
          assert-one-assert-per-pytest
          --verbose
          ${{ github.workspace }}/test/lib/
          ${{ github.workspace }}/test/scripts/
      # ── Python linters (conditional) ──
      - if: steps.detect.outputs.scripts_changed == 'true'
        name: Run pylint on source
        run: >-
          PYTHONPATH=.:scripts python3 -m pylint
          lib/python/ scripts/
          --fail-on=C,R,W --fail-under=10.0
      - if: steps.detect.outputs.scripts_changed == 'true'
        name: Run pylint on tests
        run: >-
          PYTHONPATH=.:scripts python3 -m pylint --recursive=y
          test/scripts/ test/lib/
          --fail-on=C,R,W --fail-under=10.0
      - if: steps.detect.outputs.scripts_changed == 'true'
        name: Run mypy on source
        run: >-
          PYTHONPATH=.:scripts python3 -m mypy
          lib/python/ scripts/
      - if: steps.detect.outputs.scripts_changed == 'true'
        name: Run mypy on tests
        run: >-
          MYPYPATH=.:scripts python3 -m mypy
          test/scripts/ test/lib/
      - if: steps.detect.outputs.scripts_changed == 'true'
        name: Detect copy-paste in source (Python)
        run: >-
          jscpd --pattern "**/*.py" --threshold 0
          --reporters console lib/python/ scripts/
      - if: steps.detect.outputs.scripts_changed == 'true'
        name: Detect copy-paste in tests (Python)
        run: >-
          jscpd --pattern "**/*.py" --threshold 0
          --reporters console test/scripts/ test/lib/
      # ── C++ formatting and limits ──
      - name: Check formatting
        run: |
          find src test -name '*.cpp' -o -name '*.h' | \
            xargs clang-format-18 \
            --dry-run --Werror --style=google
      - name: Check file line limits
        run: |
          fail=0
          for f in $(find src test -name '*.cpp' -o -name '*.h')
          do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 1000 ]; then
              echo "FAIL: $f has $lines lines (max 1000)"
              fail=1
            fi
          done
          exit $fail
      # ── Copy-paste detection (C++) ──
      - name: Detect copy-paste in source (C++)
        run: >-
          pmd cpd
          --minimum-tokens 100
          --language cpp
          --dir src/
      - name: Detect copy-paste in tests (C++)
        run: >-
          pmd cpd
          --minimum-tokens 100
          --language cpp
          --dir test/src/
          --dir lib/cpp/test/
  # ── Lane: lib/run_tests_common ──
  test-lib-run-tests-common:
    if: >-
      needs.static-analysis.outputs.scripts-changed == 'true'
    needs: static-analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
