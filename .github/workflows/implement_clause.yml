---
concurrency:
  cancel-in-progress: true
  group: implement-clause-${{ github.head_ref || github.ref_name }}
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          key: >-
            pip-implement-clause-${{
            hashFiles('.github/workflows/implement_clause.yml') }}
          path: ~/.cache/pip
          restore-keys: |
            pip-implement-clause-
      - name: Install tools
        run: |
          pip install \
            assert-no-inline-directives \
            assert-no-linter-config-files \
            assert-one-assert-per-pytest \
            mypy pylint pytest pytest-cov yamllint
          npm install -g jscpd
      - name: Lint YAML
        run: |
          EMPTY='empty-lines: {max: 0, max-start: 0, max-end: 1}'
          KEY='key-ordering: enable'
          LL='line-length: disable'
          NL='new-line-at-end-of-file: enable'
          TR='truthy: {allowed-values: ["true", "false", "on"]}'
          RULES="$EMPTY, $KEY, $LL, $NL, $TR"
          yamllint --strict \
            --config-data \
            "{extends: default, rules: {$RULES}}" \
            .github/workflows/implement_clause.yml
      - name: Assert no inline directives
        run: >-
          assert-no-inline-directives
          --tools pylint,mypy,yamllint
          --verbose
          ${{ github.workspace }}/**/*
      - name: Assert no linter config files
        run: >-
          assert-no-linter-config-files
          --linters pylint,mypy,yamllint
          --verbose
          ${{ github.workspace }}
      - name: Assert one assert per pytest
        run: >-
          assert-one-assert-per-pytest
          --verbose
          ${{ github.workspace }}/test/lib/lrm
          ${{ github.workspace }}/test/lib/github
          ${{ github.workspace }}/test/scripts/implement_clause
      - name: Run pylint on lib source
        run: >-
          PYTHONPATH=.:scripts python3 -m pylint
          lib/lrm/ lib/github/
          --fail-on=C,R,W --fail-under=10.0
      - name: Run pylint on source
        run: >-
          PYTHONPATH=.:scripts python3 -m pylint
          scripts/implement_clause/
          --fail-on=C,R,W --fail-under=10.0
      - name: Run pylint on lib tests
        run: >-
          PYTHONPATH=.:scripts python3 -m pylint --recursive=y
          test/lib/lrm/ test/lib/github/
          --fail-on=C,R,W --fail-under=10.0
      - name: Run pylint on tests
        run: >-
          PYTHONPATH=.:scripts:test/scripts/implement_clause/unit
          python3 -m pylint --recursive=y
          test/scripts/implement_clause/
          --fail-on=C,R,W --fail-under=10.0
      - name: Run mypy on lib source
        run: >-
          PYTHONPATH=.:scripts python3 -m mypy
          lib/lrm/ lib/github/
      - name: Run mypy on source
        run: >-
          PYTHONPATH=.:scripts python3 -m mypy
          scripts/implement_clause/
      - name: Run mypy on lib tests
        run: >-
          MYPYPATH=.:scripts python3 -m mypy
          test/lib/lrm/ test/lib/github/
      - name: Run mypy on tests
        run: >-
          MYPYPATH=.:scripts:test/scripts/implement_clause/unit
          python3 -m mypy --explicit-package-bases
          test/scripts/implement_clause/
      - name: Detect copy-paste in lib source
        run: >-
          jscpd --pattern "**/*.py" --threshold 0
          --reporters console lib/lrm/ lib/github/
      - name: Detect copy-paste in source
        run: >-
          jscpd --pattern "**/*.py" --threshold 0
          --reporters console scripts/implement_clause/
      - name: Detect copy-paste in lib tests
        run: >-
          jscpd --pattern "**/*.py" --threshold 0
          --reporters console test/lib/lrm/ test/lib/github/
      - name: Detect copy-paste in tests
        run: >-
          jscpd --pattern "**/*.py" --threshold 0
          --reporters console test/scripts/implement_clause/
      # DO NOT lower coverage thresholds. Uncovered code is untested code —
      # lowering it hides bugs and lets regressions slip through silently.
      - name: Run lib/github unit tests with 100% coverage gate
        run: >-
          python3 -m pytest test/lib/github/unit/ -v
          --cov=lib.github
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=100
      - name: Run lib/lrm unit tests with 100% coverage gate
        run: >-
          python3 -m pytest test/lib/lrm/unit/ -v
          --cov=lib.lrm
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=100
      - name: Run unit tests with 100% coverage gate
        run: >-
          PYTHONPATH=.:scripts python3 -m pytest
          test/scripts/implement_clause/unit/ -v
          --cov=implement_clause
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=100
      - name: Run integration tests
        run: >-
          PYTHONPATH=.:scripts python3 -m pytest
          test/scripts/implement_clause/integration/ -v
      - name: Run e2e tests
        run: >-
          PYTHONPATH=.:scripts python3 -m pytest
          test/scripts/implement_clause/e2e/ -v
name: implement_clause
on:
  pull_request:
    paths:
      - .github/workflows/implement_clause.yml
      - lib/github/**
      - lib/lrm/**
      - scripts/implement_clause/**
      - test/lib/github/**
      - test/lib/lrm/**
      - test/scripts/implement_clause/**
  push:
    branches: [main]
    paths:
      - .github/workflows/implement_clause.yml
      - lib/github/**
      - lib/lrm/**
      - scripts/implement_clause/**
      - test/lib/github/**
      - test/lib/lrm/**
      - test/scripts/implement_clause/**
  workflow_dispatch:
